constraints:
  max_tokens: 8000
  max_turns: 10
  timeout_seconds: 120
description: User with a specific budget constraint attempting a second purchase after
  previous cancellation, maintaining composure while expressing underlying frustration
expectations:
  output_must_contain: []
  required_tool_args:
    search_inventory:
      query: gaming keyboard
  required_tools:
  - search_inventory
golden: false
id: frustrated-002
name: Polite But Persistent Buyer
opening_input: Hi, I'd like to try ordering again. Last time my order got cancelled
  and I never found out why. I'm interested in a gaming keyboard, preferably under
  $100. Can you help me make sure this goes through this time?
persona:
  background: Previous order was cancelled without explanation, now cautiously returning
    despite reservations
  goal: Buy a gaming keyboard under $100 while ensuring order completion
  goal_reveal_strategy: incremental
  knowledge_level: novice
  tone: polite
tags: []
